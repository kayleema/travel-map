{% extends "allauth/layouts/entrance.html" %}
{% load static %}
{% load i18n %}

{% block extra_body %}
    <footer>
    <form class=language action="{% url 'set_language' %}" method="post">{% csrf_token %}
        <input name="next" type="hidden" value="{{ redirect_to }}">
        <fieldset role="group" style="max-width: 300px;">
        <select title="language" name="language" class="secondary">
            {% get_current_language as LANGUAGE_CODE %}
            {% get_available_languages as LANGUAGES %}
            {% get_language_info_list for LANGUAGES as languages %}
            {% for language in languages %}
                <option value="{{ language.code }}"{% if language.code == LANGUAGE_CODE %} selected{% endif %}>
                    {{ language.name_local }} ({{ language.code }})
                </option>
            {% endfor %}
        </select>
        <input type="submit" value="{% translate "Select" %}" class="secondary">
        </fieldset>
    </form>
    </footer>
{% endblock %}
