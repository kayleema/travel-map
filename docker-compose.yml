services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: travelregistration
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASS}
    volumes:
      - tabicat_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d travelregistration"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: kaori8/travel-map:latest # replace with your own image name
    build: .
    platform: linux/amd64
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: travelmap.settings_prod
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASS: ${DATABASE_PASS}
      DATABASE_HOST: db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  tabicat_postgres_data:
