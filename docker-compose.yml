services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: travelregistration
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASS}
    volumes:
      - tabicat_postgres_data:/var/lib/postgresql/data

  web:
    build: .
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: travelmap.settings_prod
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASS: ${DATABASE_PASS}
      DATABASE_HOST: db
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  tabicat_postgres_data:
